name: Landing page link check

on:
  push:
    branches: [main]
    paths: [landing/**]
  pull_request:
    branches: [main]
    paths: [landing/**]

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd app && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd app && npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for GitHub Pages deploy
        if: github.event_name == 'push'
        run: sleep 30

      - name: Run link tests
        run: cd app && npx playwright test ../landing/links.test.js --config ../landing/playwright.config.js
